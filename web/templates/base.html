<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bug Detector{% endblock %}</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2.1">
</head>

<body>

    <!-- Overlay for mobile -->
    <div class="overlay"></div>

    <!-- Theme Toggle (Fixed Top Right) -->
    <div class="theme-switch-wrapper">
        {% if user %}
        <a href="{{ url_for('logout') }}" class="btn btn-outline"
            style="margin-right: 15px; height: 40px; padding: 0 1.25rem; font-size: 0.9rem; border-radius: 40px;">Logout</a>
        {% else %}
        <a href="{{ url_for('login') }}" class="btn btn-primary"
            style="margin-right: 15px; height: 40px; padding: 0 1.25rem; font-size: 0.9rem; border-radius: 40px;">Login</a>
        {% endif %}

        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round">
                <div class="icon-sun">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </div>
                <div class="icon-moon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </div>
            </div>
        </label>
    </div>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <span>Bug Detector<span class="sidebar-brand-accent"></span></span>
            <button id="menu-close" class="menu-close" aria-label="Close Menu">&times;</button>
        </div>
        <ul class="sidebar-nav">
            <li class="nav-item">
                <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                    Home
                </a>
            </li>
            {% if user %}
            <li class="nav-item">
                <a href="{{ url_for('dashboard') }}"
                    class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
                    Dashboard
                </a>
            </li>
            {% endif %}
            <li class="nav-item">
                <a href="{{ url_for('detect') }}"
                    class="nav-link {% if request.endpoint == 'detect' %}active{% endif %}">
                    Bug Detection
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('generate') }}"
                    class="nav-link {% if request.endpoint == 'generate' %}active{% endif %}">
                    Test Generation
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('donate') }}"
                    class="nav-link {% if request.endpoint == 'donate' %}active{% endif %}">
                    Donate
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('about') }}" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">
                    About Us
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Top Header (Visible on Mobile/Tablet) -->
        <header class="top-header">
            <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Navigation">
                ☰
            </button>
            <span style="font-weight: 700; margin-left: 1rem;">Bug Detector</span>
        </header>

        <!-- Page Content -->
        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
        {% block footer %}{% endblock %}
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}?v=1.3"></script>
</body>

</html>
