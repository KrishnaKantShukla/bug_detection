{% extends 'base.html' %}

{% block title %}Server Error - Bug Detector{% endblock %}

{% block content %}
<div class="auth-container" style="text-align: center; max-width: 600px; padding: 4rem 2rem; border-color: rgba(239, 68, 68, 0.3);">
    <h1 style="font-size: 4rem; color: #ef4444; margin-bottom: 1rem;">500</h1>
    <h2 style="margin-bottom: 1rem;">Internal Server Error</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">
        Oops! Something went wrong on our end. Our engineering team has been notified.
    </p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Return to Dashboard</a>
</div>
{% endblock %}
