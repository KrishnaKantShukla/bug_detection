{% extends 'base.html' %}

{% block title %}Page Not Found - Bug Detector{% endblock %}

{% block content %}
<div class="auth-container" style="text-align: center; max-width: 600px; padding: 4rem 2rem;">
    <h1 style="font-size: 4rem; color: var(--primary-color); margin-bottom: 1rem;">404</h1>
    <h2 style="margin-bottom: 1rem;">Page Not Found</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
    </p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Return to Dashboard</a>
</div>
{% endblock %}
